<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Thoughts 👀</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
<div class="container" style="display: flex;">
    <div class="content-box">
        <h1 id="title">Share Your Feeling Babe 👀</h1>
        <p id="para">Tell me how you felt about this little surprise.</p>
        <form id="feedbackForm" action="https://formsubmit.co/ban2sarkar123@gmail.com" method="POST">
            <textarea id="feedbackText" name="message" placeholder="Yaha likho meri jaan..." required></textarea>
            <button type="submit" id="submitBtn" class="button">submit here cutie 👀💋</button>
        </form>
    </div>
    <div class="footer">Forever Yours My Sweetheart 💋</div>
</div>

<script>
function triggerSparkles(event) { confetti({ particleCount: 50, spread: 70, origin: { x: event.clientX / window.innerWidth, y: event.clientY / window.innerHeight }, colors: ['#ff4d6d', '#ffffff', '#ffd700'] }); }

function animateLetters(el, callback) {
    const originalText = el.innerText || el.textContent; el.innerHTML = "";
    const words = originalText.split(" ");
    words.forEach((word, wordIndex) => {
        const wordWrapper = document.createElement("span");
        wordWrapper.style.display = "inline-block"; wordWrapper.style.whiteSpace = "nowrap"; 
        [...word].forEach(char => {
            const letterSpan = document.createElement("span"); letterSpan.innerHTML = char;
            letterSpan.classList.add("reveal-span"); wordWrapper.appendChild(letterSpan);
        });
        el.appendChild(wordWrapper);
        if (wordIndex < words.length - 1) {
            const space = document.createElement("span"); space.innerHTML = "&nbsp;"; space.style.display = "inline-block"; el.appendChild(space);
        }
    });
    const allLetters = el.querySelectorAll(".reveal-span");
    let i = 0;
    const interval = setInterval(() => {
        if(i < allLetters.length) { allLetters[i].classList.add("reveal"); i++; }
        else { clearInterval(interval); if(callback) callback(); }
    }, 30);
}

window.onload = () => {
    const t = document.getElementById("title"); const p = document.getElementById("para"); const b = document.getElementById("submitBtn");
    t.style.visibility = "visible"; t.style.opacity = "1";
    p.style.visibility = "visible"; p.style.opacity = "1";
    animateLetters(t, () => {
        t.classList.add("underline-grow");
        setTimeout(() => { animateLetters(p, () => { b.classList.add("show-btn"); }); }, 600);
    });
};

const form = document.getElementById('feedbackForm');
form.addEventListener('submit', function(e) { e.preventDefault(); triggerSparkles({ clientX: window.innerWidth / 2, clientY: window.innerHeight / 2 }); document.getElementById('submitBtn').innerText = "Sending... 💗"; setTimeout(() => { form.submit(); }, 1200); });
</script>
</body>
</html>
