<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something From My Heart 💌</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .choice-box { display: none; margin-top: 25px; gap: 12px; justify-content: center; align-items: center; width: 100%; min-height: 140px; position: relative; overflow: visible; }
        #yesBtn, #noBtn { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease !important; white-space: nowrap; flex-shrink: 0; }
        #nextBtn { display: none; margin-top: 25px; }
    </style>
</head>
<body>
<div class="container" style="display: flex;">
    <div class="content-box">
        <h1 id="title">One Confession 💌</h1>
        <p id="para">ᴛʜᴇʀᴇ’ꜱ ꜱᴏᴍᴇᴛʜɪɴɢ ɪ ᴀʟᴡᴀʏꜱ ᴡᴀɴᴛᴇᴅ ᴛᴏ ꜱᴀʏ...</p>
        <div id="choiceContainer" class="choice-box">
            <button id="yesBtn" class="button show-btn btn-yes">yes 👀💋</button>
            <button id="noBtn" class="button show-btn btn-no">no 🙂‍↔️</button>
        </div>
    </div>
    <a href="feedback.html" class="button" id="nextBtn">ek akhri chiz 👀</a>
    <div class="footer">be mine sweetheart 👉👈💋</div>
</div>

<script>
let noClicks = 0; const maxTaps = 10; let yesScale = 1; let noScale = 1;
function triggerSparkles(event) { confetti({ particleCount: 50, spread: 70, origin: { x: event.clientX / window.innerWidth, y: event.clientY / window.innerHeight }, colors: ['#ff4d6d', '#ffffff', '#ffd700'] }); }

function animateLetters(el, callback) {
    const originalText = el.innerText || el.textContent; el.innerHTML = "";
    const words = originalText.split(" ");
    words.forEach((word, wordIndex) => {
        const wordWrapper = document.createElement("span");
        wordWrapper.style.display = "inline-block"; wordWrapper.style.whiteSpace = "nowrap"; 
        [...word].forEach(char => {
            const letterSpan = document.createElement("span"); letterSpan.innerHTML = char;
            letterSpan.classList.add("reveal-span"); wordWrapper.appendChild(letterSpan);
        });
        el.appendChild(wordWrapper);
        if (wordIndex < words.length - 1) {
            const space = document.createElement("span"); space.innerHTML = "&nbsp;"; space.style.display = "inline-block"; el.appendChild(space);
        }
    });
    const allLetters = el.querySelectorAll(".reveal-span");
    let i = 0;
    const interval = setInterval(() => {
        if(i < allLetters.length) { allLetters[i].classList.add("reveal"); i++; }
        else { clearInterval(interval); if(callback) callback(); }
    }, 25);
}

window.onload = () => {
    const t = document.getElementById("title"); const p = document.getElementById("para");
    t.style.visibility = "visible"; t.style.opacity = "1";
    p.style.visibility = "visible"; p.style.opacity = "1";
    animateLetters(t, () => {
        t.classList.add("underline-grow");
        setTimeout(() => { animateLetters(p, () => { document.getElementById("choiceContainer").style.display = "flex"; }); }, 600);
    });
};

const yesBtn = document.getElementById('yesBtn'); const noBtn = document.getElementById('noBtn'); const choiceContainer = document.getElementById('choiceContainer');
noBtn.addEventListener('click', (e) => {
    noClicks++;
    if (noClicks < maxTaps) {
        noScale -= 0.06; yesScale += 0.05;
        noBtn.style.setProperty('transform', `scale(${noScale})`, 'important');
        yesBtn.style.setProperty('transform', `scale(${yesScale})`, 'important');
        choiceContainer.style.gap = (12 + (noClicks * 5)) + "px";
    } 
    if (noClicks >= maxTaps) { noBtn.style.display = "none"; yesBtn.style.setProperty('transform', 'scale(1)', 'important'); }
});

yesBtn.addEventListener('click', (e) => { triggerSparkles(e); choiceContainer.style.display = "none"; document.getElementById('nextBtn').style.display = "inline-block"; setTimeout(() => { document.getElementById('nextBtn').classList.add("show-btn"); }, 100); });
document.getElementById('nextBtn').addEventListener('click', function(e) { triggerSparkles(e); e.preventDefault(); setTimeout(() => { window.location.href = this.href; }, 600); });
</script>
</body>
</html>
